name: Track Game Versions

on:
  schedule:
    # 自动触发于 UTC 3:00 (北京时间 11:00) ， 同时存在 cron-job.org 定时触发 ， 双重保障
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run tracking script
        run: python track.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update version tracking'
          commit_user_name: 'GitHub Actions'
          commit_user_email: 'actions@github.com'
