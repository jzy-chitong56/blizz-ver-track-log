name: Track Game Versions

on:
  schedule:
    # Daily at UTC 15:00 (Beijing 23:00)
    - cron: '0 15 * * *'
    # Daily at UTC 15:30 (Beijing 23:30) - backup
    - cron: '30 15 * * *'
    # Daily at UTC 16:00 (Beijing 00:00 next day) - backup
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run tracking script
        run: python track.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update version tracking'
          commit_user_name: 'GitHub Actions'
          commit_user_email: 'actions@github.com'
