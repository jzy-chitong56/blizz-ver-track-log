name: Track Game Versions

on:
  schedule:
    # 每 6 小时运行一次（UTC 0/6/12/18 点 = 北京时间 8/14/20/2 点）
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      config:
        description: '单独运行某个配置（填配置文件名，不含扩展名，如 w3_ptr_internal）。留空则运行所有配置'
        required: false
        default: ''

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run tracking script
        env:
          CONFIG_INPUT: ${{ github.event.inputs.config }}
        run: |
          if [ -n "$CONFIG_INPUT" ]; then
            python track.py --config "configs/${CONFIG_INPUT}.yaml"
          else
            python track.py
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update version tracking'
          commit_user_name: 'GitHub Actions'
          commit_user_email: 'actions@github.com'
